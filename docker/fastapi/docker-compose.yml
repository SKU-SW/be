version: "3.8"

services:
  fastapi-chzzk-session:
    build:
      context: ../..
      dockerfile: docker/fastapi/Dockerfile
    image: sku-sw-fastapi-chzzk-session:latest
    container_name: sku-sw-fastapi-chzzk-session
    ports:
      - "8000:8000"
    environment:
      - TZ=${TZ:-Asia/Seoul}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CHZZK_API_BASE_URL=${CHZZK_API_BASE_URL:-https://openapi.chzzk.naver.com}
      - CHZZK_SESSION_AUTH_PATH=${CHZZK_SESSION_AUTH_PATH:-/open/v1/sessions/auth}
      - CHZZK_CHAT_SUBSCRIBE_PATH=${CHZZK_CHAT_SUBSCRIBE_PATH:-/open/v1/sessions/events/subscribe/chat}
      - CHZZK_HTTP_TIMEOUT_SEC=${CHZZK_HTTP_TIMEOUT_SEC:-5}
      - CHZZK_SOCKET_CONNECT_TIMEOUT_SEC=${CHZZK_SOCKET_CONNECT_TIMEOUT_SEC:-5}
      - CHZZK_SYSTEM_EVENT_TIMEOUT_SEC=${CHZZK_SYSTEM_EVENT_TIMEOUT_SEC:-5}
      - CHZZK_SOCKET_REQUEST_TIMEOUT_SEC=${CHZZK_SOCKET_REQUEST_TIMEOUT_SEC:-5}
    restart: unless-stopped

