# HTTP -> HTTPS 리다이렉트 + Certbot 인증용
server {
    listen 80;
    server_name dev.sku-sw.cloud;

    # Let's Encrypt 인증 챌린지
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 그 외 모든 요청은 HTTPS로 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 서버
server {
    listen 443 ssl;
    server_name dev.sku-sw.cloud;

    # SSL 인증서 경로 (certbot이 발급한 인증서)
    ssl_certificate /etc/letsencrypt/live/dev.sku-sw.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.sku-sw.cloud/privkey.pem;

    # SSL 보안 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Spring Boot API 서버로 프록시 (같은 VPC 내 프라이빗 IP 사용)
    location / {
        proxy_pass http://10.0.2.118:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Swagger UI 캐시 비활성화
    location /swagger-ui {
        proxy_pass http://10.0.2.118:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # Actuator 엔드포인트 (/manage)
    location /manage {
        # IP 제한을 원하면 아래 주석 해제
        # allow <허용할 IP>;
        # deny all;

        proxy_pass http://10.0.2.118:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }
}
