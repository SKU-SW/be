spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://${DEV_DB_HOST}:3306/${DEV_DB_NAME}?&useSSL=false&useUnicode=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&rewriteBatchedStatements=true
    username: ${DEV_DB_USER}
    password: ${DEV_DB_PW}
  jpa:
    show-sql: false       # dev 서버 로그 과부하 방지
    hibernate:
      ddl-auto: update
  data:
    redis:
      host: ${DEV_REDIS_HOST}   # dev용 Redis 호스트
      port: 6379
      password: ${DEV_REDIS_PW}
  cloud:
    aws:
      credentials:
        access-key: ${S3_ACCESS_KEY}
        secret-key: ${S3_SECRET_KEY}
    cloudfront:
      domain: ${DEV_CLOUDFRONT_DOMAIN}

logging:
  level:
    root: INFO                           # 정상 흐름만 출력
    org.hibernate.SQL: WARN              # SQL은 경고 이상만 (show-sql: false와 맞춤)
    org.springframework.web: INFO        # 요청/응답 흐름 확인
    org.springframework.security: INFO   # 인증/인가 흐름 확인

server:
  forward-headers-strategy: framework   # Nginx 프록시 뒤 HTTPS 환경에서 forwarded header 처리
  url: https://dev.sku-sw.cloud
  servlet:
    session:
      cookie:
        secure: true   # https 기준으로 운영 권장

springdoc:
  swagger-ui:
    enabled: true   # dev 서버에서는 Swagger 허용 (prod에서는 false)

# Actuator - dev에서는 주요 엔드포인트 추가 노출
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, loggers
  endpoint:
    health:
      show-details: always   # 헬스체크 상세 정보 표시

jwt:
  token:
    secretKey: ${DEV_JWT_SECRET_KEY}

gemini:
  api:
    key: ${GEMINI_API_KEY}
    dialogue-model-base-url: https://generativelanguage.googleapis.com/v1beta
    summary-model-base-url: https://generativelanguage.googleapis.com/v1beta
    live-websocket-url: wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent
    live-connect-timeout-ms: 5000
    live-setup-timeout-ms: 5000
    dialogue-model: gemini-3.1-flash-live-preview
    summary-model: gemini-3-flash-preview

broadcast:
  dialogue:
    redis-max-num: ${REDIS_BROADCAST_DIALOGUE_MAX_NUM:50}
    redis-max-refresh-retry-count: ${REDIS_MAX_REFRESH_RETRY_COUNT:1}

fastapi:
  base-url: ${FASTAPI_BASE_URL:http://localhost:8000}
  tts-path: ${FASTAPI_TTS_PATH:/api/tts/synthesize}
  connect-timeout-ms: 5000
  read-timeout-ms: 30000
  max-in-memory-size-bytes: ${FASTAPI_MAX_IN_MEMORY_SIZE_BYTES:2097152}
